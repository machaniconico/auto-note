name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    name: Windows quality gate
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Compile Python
        shell: pwsh
        run: python -m compileall src tests

      - name: Run unit tests
        shell: pwsh
        run: python -m unittest discover -s tests

      - name: Run product quality gate
        shell: pwsh
        run: python -m auto_note quality --project-dir . --product-only

      - name: Check hidden launcher syntax
        shell: pwsh
        run: |
          $env:AUTO_NOTE_LAUNCHER_CHECK = "1"
          cscript.exe //nologo .\scripts\launch-gui.vbs

      - name: Run install smoke
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\smoke-install.ps1 -SourceDir .

      - name: Run release smoke
        shell: pwsh
        run: |
          python -m auto_note release --project-dir .
          $release = Get-ChildItem -LiteralPath .\.auto-note\releases -Filter "auto-note-release-*.zip" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $release) {
            throw "Release smoke did not create a release zip."
          }
          python -m auto_note release --verify $release.FullName

      - name: Run GUI smoke
        shell: pwsh
        run: python -m auto_note gui --project-dir . --smoke
